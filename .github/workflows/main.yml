name: EGovernance Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pytest
        run: pip install pytest

      - name: Run Tests
        run: pytest

      - name: Deploy
        run: echo "Deployment Successful"
